name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: pip install ruff black isort mypy

      - name: Check formatting (black)
        run: black --check .

      - name: Check imports (isort)
        run: isort --check-only .

      - name: Lint (ruff)
        run: ruff check .

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run SDK tests
        run: pytest sdk/tests/ -v --cov=sdk/metosim --cov-report=xml --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: sdk-coverage
          path: coverage.xml

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metosim
          POSTGRES_PASSWORD: password
          POSTGRES_DB: metosim
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://metosim:password@localhost:5432/metosim
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Run API tests
        run: pytest api/tests/ -v --cov=api/app --cov-report=xml --cov-fail-under=85

  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev,engine]"

      - name: Run engine tests
        run: pytest engine/tests/ -v --cov=engine/metosim_engine --cov-report=xml --cov-fail-under=80
